{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>
                <i class="bi bi-journal-arrow-up"></i>
                Issue Book
            </h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <!-- Student -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Select Student

                        </label>

                        <select
                            name="student"
                            class="form-select"
                            required>

                            <option value="">

                                Choose Student

                            </option>

                            {% for student in students %}

                            <option value="{{ student.id }}">

                                {{ student.student_id }} - {{ student.name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Book -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Select Book

                        </label>

                        <select
                            name="book"
                            class="form-select"
                            required>

                            <option value="">

                                Choose Book

                            </option>

                            {% for book in books %}

                            <option value="{{ book.id }}">

                                {{ book.title }} ({{ book.available }} Available)

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Issue Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Issue Date

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ issue_date.strftime('%d-%b-%Y') }}"
                            readonly>

                    </div>

                    <!-- Due Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Due Date

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            value="{{ due_date.strftime('%d-%b-%Y') }}"
                            readonly>

                    </div>

                </div>

                <div class="mt-3">

                    <button
                        type="submit"
                        class="btn btn-success">

                        <i class="bi bi-check-circle-fill"></i>

                        Issue Book

                    </button>

                    <a
                        href="{{ url_for('dashboard.dashboard') }}"
                        class="btn btn-secondary">

                        <i class="bi bi-arrow-left-circle"></i>

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
