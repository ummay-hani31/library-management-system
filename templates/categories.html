{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">

                    <h4>Add Category</h4>

                </div>

                <div class="card-body">

                    <form method="POST"
                          action="{{ url_for('categories.add_category') }}">

                        <div class="mb-3">

                            <label>Category Name</label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                required>

                        </div>

                        <button class="btn btn-success w-100">

                            Add Category

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-dark text-white">

                    <h4>Categories</h4>

                </div>

                <div class="card-body">

                    <form method="GET"
                          class="mb-3">

                        <div class="input-group">

                            <input
                                type="text"
                                name="search"
                                class="form-control"
                                placeholder="Search Category">

                            <button class="btn btn-primary">

                                Search

                            </button>

                        </div>

                    </form>

                    <table class="table table-bordered table-hover">

                        <thead class="table-secondary">

                        <tr>

                            <th>ID</th>

                            <th>Category</th>

                            <th width="220">

                                Action

                            </th>

                        </tr>

                        </thead>

                        <tbody>

                        {% for category in categories %}

                        <tr>

                            <td>{{ category.id }}</td>

                            <td>{{ category.name }}</td>

                            <td>

                                <!-- Edit Button -->

                                <button
                                    class="btn btn-warning btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#edit{{ category.id }}">

                                    Edit

                                </button>

                                <a
                                    href="{{ url_for('categories.delete_category', id=category.id) }}"
                                    class="btn btn-danger btn-sm"
                                    onclick="return confirm('Delete this category?')">

                                    Delete

                                </a>

                            </td>

                        </tr>

                        <!-- Edit Modal -->

                        <div class="modal fade"
                             id="edit{{ category.id }}"
                             tabindex="-1">

                            <div class="modal-dialog">

                                <div class="modal-content">

                                    <form
                                        method="POST"
                                        action="{{ url_for('categories.edit_category', id=category.id) }}">

                                        <div class="modal-header">

                                            <h5>Edit Category</h5>

                                            <button
                                                type="button"
                                                class="btn-close"
                                                data-bs-dismiss="modal">

                                            </button>

                                        </div>

                                        <div class="modal-body">

                                            <input
                                                type="text"
                                                name="name"
                                                value="{{ category.name }}"
                                                class="form-control"
                                                required>

                                        </div>

                                        <div class="modal-footer">

                                            <button
                                                class="btn btn-success">

                                                Update

                                            </button>

                                        </div>

                                    </form>

                                </div>

                            </div>

                        </div>

                        {% endfor %}

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
